<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>קומפס מעדני בשר - הזמנות אונליין כפר סבא</title>
  <style>
    :root {
      --bg: #050505;
      --panel: #121212;
      --panel-2: #1a1a1a;
      --line: #2a2a2a;
      --text: #f2efe9;
      --muted: #b7ad9c;
      --gold: #d8a950;
      --red: #b42020;
      --red-deep: #8f1414;
      --radius: 16px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #000;
      color: var(--text);
      font-family: "Assistant", "Heebo", Arial, sans-serif;
    }

    .site {
      width: min(620px, 100vw);
      margin: 0 auto;
      min-height: 100vh;
      background: #070707;
      border-inline: 1px solid #161616;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 60;
      background: rgba(5, 5, 5, 0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid #191919;
    }

    .topbar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      padding: 10px 12px;
      gap: 8px;
      min-height: 64px;
    }

    .cart-pill {
      border: 0;
      background: linear-gradient(160deg, var(--red), var(--red-deep));
      color: #fff;
      border-radius: 999px;
      padding: 9px 14px;
      font-weight: 700;
      display: inline-flex;
      gap: 6px;
      align-items: center;
      cursor: pointer;
    }

    .brand { text-align: center; }
    .brand h1 { margin: 0; font-size: 1rem; }
    .brand p { margin: 2px 0 0; font-size: .68rem; color: var(--gold); letter-spacing: 1px; }

    .logo {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid #383028;
    }

    .hero {
      position: relative;
      height: 220px;
      overflow: hidden;
      border-bottom: 1px solid #181818;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(0deg, rgba(0, 0, 0, .84), rgba(0, 0, 0, .35));
      z-index: 1;
    }

    .hero img { width: 100%; height: 100%; object-fit: cover; }
    .hero-copy {
      position: absolute;
      right: 16px;
      bottom: 18px;
      z-index: 2;
      text-align: right;
      max-width: 72%;
    }
    .hero-copy h2 { margin: 0; font-size: 2rem; line-height: 1.1; }
    .hero-copy h2 span { color: var(--gold); }
    .hero-copy p { margin: 4px 0 0; color: #d1c6b2; font-size: .9rem; }

    main { padding: 12px; }

    .filters {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 8px;
      scrollbar-width: thin;
      border-bottom: 1px solid #1b1b1b;
    }

    .chip {
      white-space: nowrap;
      border: 1px solid #393939;
      border-radius: 999px;
      background: #202020;
      color: #f3f3f3;
      padding: 7px 12px;
      cursor: pointer;
      font-size: .92rem;
    }
    .chip.active { background: linear-gradient(160deg, var(--red), var(--red-deep)); border-color: transparent; }

    .section-title { color: var(--gold); margin: 14px 0 10px; font-size: 1.02rem; }

    .products {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .card {
      background: var(--panel);
      border: 1px solid #252525;
      border-radius: 11px;
      overflow: hidden;
    }

    .product-img, .no-img {
      width: 100%;
      aspect-ratio: 1/1;
      display: block;
      background: #0d0d0d;
      object-fit: cover;
    }

    .no-img {
      display: grid;
      place-items: center;
      color: #777;
      font-size: .82rem;
      border-bottom: 1px solid #1b1b1b;
    }

    .no-img::before { content: "אין תמונה"; }

    .product-body { padding: 8px; }
    .product-body h3 { margin: 0 0 4px; font-size: .95rem; min-height: 2.2em; }
    .meta { color: var(--muted); font-size: .82rem; min-height: 2.2em; }
    .price { color: var(--gold); font-size: 1.2rem; font-weight: 800; margin: 6px 0; }

    .qty-row { display: grid; grid-template-columns: 1fr auto; gap: 6px; align-items: center; }
    .stepper {
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      background: #2a2a2a;
      border-radius: 8px;
      border: 1px solid #3a3a3a;
      overflow: hidden;
    }
    .stepper button {
      border: 0;
      background: transparent;
      color: #fff;
      width: 30px;
      height: 30px;
      cursor: pointer;
      font-size: 1.1rem;
    }
    .stepper input {
      width: 42px;
      border: 0;
      text-align: center;
      background: transparent;
      color: #fff;
      font-weight: 700;
    }

    .btn-add {
      border: 0;
      background: linear-gradient(160deg, var(--red), var(--red-deep));
      color: white;
      border-radius: 8px;
      height: 30px;
      padding: 0 10px;
      font-weight: 700;
      cursor: pointer;
    }

    .cart-box {
      margin-top: 16px;
      background: #101010;
      border: 1px solid #232323;
      border-radius: var(--radius);
      padding: 12px;
    }

    input, select, textarea {
      width: 100%;
      background: var(--panel-2);
      border: 1px solid #343434;
      color: var(--text);
      padding: 10px;
      border-radius: 10px;
      font: inherit;
      margin-top: 3px;
      margin-bottom: 8px;
    }

    .submit {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 11px;
      color: #fff;
      font-weight: 800;
      background: linear-gradient(160deg, var(--red), var(--red-deep));
      cursor: pointer;
    }

    .footer {
      margin-top: 24px;
      border-top: 1px solid #1a1a1a;
      padding: 16px 10px 24px;
      text-align: center;
      color: #d3bc93;
      font-size: .88rem;
    }

    .cart-float {
      position: fixed;
      left: 10px;
      bottom: 12px;
      z-index: 80;
    }

    .toast {
      position: fixed;
      inset: auto 50% 70px auto;
      transform: translateX(50%);
      background: #181818;
      border: 1px solid var(--gold);
      padding: 9px 12px;
      border-radius: 10px;
      display: none;
      z-index: 99;
    }

    @media (min-width: 760px) {
      .site { width: min(980px, 98vw); }
      .hero { height: 300px; }
      .products { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .cart-float { left: max(10px, calc((100vw - min(980px, 98vw)) / 2 + 10px)); }
    }
  </style>
</head>
<body>
<div class="site">
  <header>
    <div class="topbar">
      <button class="cart-pill" onclick="scrollToCart()">🛒 <span id="cartCount">0</span></button>
      <div class="brand"><h1>קומפס מעדני בשר</h1><p>COMPASS PREMIUM BUTCHER</p></div>
      <img class="logo" src="compass-logo.jpeg" alt="קומפס מעדני בשר">
    </div>
  </header>

  <section class="hero">
    <img src="https://images.unsplash.com/photo-1603048297172-c92544798d5a?auto=format&fit=crop&w=1200&q=80" alt="בשר איכותי">
    <div class="hero-copy">
      <h2>בשר איכותי.<br><span>קומפס מובחר.</span></h2>
      <p>בחרו נתחים טריים להזמנה מהירה לאיסוף או משלוח.</p>
    </div>
  </section>

  <main>
    <div id="filters" class="filters"></div>
    <h3 class="section-title">בשר טרי</h3>
    <div id="products" class="products"><div>טוען מוצרים...</div></div>

    <section id="cartSection" class="cart-box">
      <h2>הסל שלי</h2>
      <div id="cartItems" class="meta">עדיין לא נבחרו מוצרים</div>
      <div class="price" id="cartTotal">₪0</div>
      <form id="orderForm">
        <label>שם מלא *</label><input name="name" required>
        <label>טלפון *</label><input name="phone" required>
        <label>אימייל</label><input name="email" type="email">
        <label>יישוב</label><input name="city" value="כפר סבא">
        <label>כתובת</label><input name="address">
        <label>סוג הזמנה</label><select name="orderType"><option>איסוף עצמי</option><option>משלוח</option></select>
        <label>הערות</label><textarea name="notes" rows="3"></textarea>
        <button class="submit" type="submit">שליחת הזמנה</button>
      </form>
    </section>

    <div class="footer">© קומפס מעדני בשר · כפר סבא · מדיניות פרטיות · תנאי שימוש</div>
  </main>
</div>

<div class="cart-float"><button class="cart-pill" onclick="scrollToCart()">סל <span id="cartTotalMini">₪0</span></button></div>
<div class="toast" id="toast"></div>

<script>
const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwuHIwl8KeVK5iwNiSu6PtzW_pvmO1K5gnd6pc3fRqzzznhS5Tg5cZaLcmpKwhwMovc/exec';
let products = []; let cart = {}; let categoryOrder = [];
const fallbackProducts = [
 {id:'entrecote',name:'אנטריקוט פרימיום',category:'נתחי בקר',unit:'ק״ג',price:199.9,description:'נתח פרימיום לצלייה',image:'',active:true},
 {id:'picanha',name:'פיקניה',category:'נתחי בקר',unit:'ק״ג',price:171.5,description:'פיקניה איכותית לצלייה',image:'',active:true},
 {id:'denver',name:'דנוור סטייק',category:'סטייקים',unit:'ק״ג',price:139.9,description:'סטייק דנוור עסיסי',image:'',active:true},
 {id:'flatiron',name:'פלאט איירון',category:'סטייקים',unit:'ק״ג',price:199.9,description:'נתח רך ומיוחד',image:'',active:true},
 {id:'asado',name:'אסאדו',category:'נתחי בקר',unit:'ק״ג',price:100.3,description:'לבישול ארוך/גריל',image:'',active:true},
 {id:'kebab',name:'קבב עגל טלה',category:'קצבייה',unit:'מארז',price:65,description:'מארז קבב איכותי',image:'',active:true}
];
// Required product columns from Google Sheets: id, category, name, price, unit, description, image, active
const REQUIRED_PRODUCT_COLUMNS = ['id','category','name','price','unit','description','image','active'];
function money(n){return '₪'+(Number(n)||0).toLocaleString('he-IL',{maximumFractionDigits:1})}
function showToast(t){const el=document.getElementById('toast');el.textContent=t;el.style.display='block';setTimeout(()=>el.style.display='none',3500)}
function scrollToCart(){document.getElementById('cartSection').scrollIntoView({behavior:'smooth',block:'start'})}
function isEmptyProductRow(p){return REQUIRED_PRODUCT_COLUMNS.every(key=>String(p?.[key] ?? '').trim()==='');}
function isActiveProduct(value){const v=String(value ?? '').trim().toLowerCase(); return v==='' || v==='true';}
function normalizeProductRow(row){const normalized = {}; REQUIRED_PRODUCT_COLUMNS.forEach(key=>normalized[key]=row?.[key] ?? ''); normalized.price = Number(normalized.price) || 0; return normalized;}
function normalizeProducts(rows){const seenCategories = new Set(); categoryOrder = []; return rows.map(normalizeProductRow).filter(row=>!isEmptyProductRow(row)).filter(row=>isActiveProduct(row.active)).map(row=>{const category=String(row.category||'כללי').trim() || 'כללי'; if(!seenCategories.has(category)){seenCategories.add(category); categoryOrder.push(category);} return {...row,category};});}
async function loadProducts(){try{ if(!GOOGLE_SCRIPT_URL.includes('script.google.com')) throw new Error('no url'); const res=await fetch(GOOGLE_SCRIPT_URL); const data=await res.json(); const fromSheet = Array.isArray(data?.products) ? data.products : []; products = fromSheet.length ? normalizeProducts(fromSheet) : normalizeProducts(fallbackProducts);}catch(e){products=normalizeProducts(fallbackProducts);} renderFilters(); renderProducts(products);}
function renderFilters(){const cats=['הכל',...categoryOrder]; document.getElementById('filters').innerHTML=cats.map((c,i)=>`<button class="chip ${i===0?'active':''}" onclick="filterCat('${c.replace(/'/g, "&#39;")}',this)">${c}</button>`).join('')}
function filterCat(cat,btn){document.querySelectorAll('.chip').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderProducts(cat==='הכל'?products:products.filter(p=>p.category===cat));}
function cleanDesc(d){return String(d||'').trim();}
function imgHtml(p){const url=String(p.image||'').trim(); return url ? `<img class="product-img" src="${url}" alt="${p.name||''}" loading="lazy" onerror="this.outerHTML='<div class=\"no-img\" aria-label=\"אין תמונה\"></div>'">` : '<div class="no-img" aria-label="אין תמונה"></div>'}
function renderProducts(list){document.getElementById('products').innerHTML=list.map(p=>{const desc=cleanDesc(p.description);return `<div class="card">${imgHtml(p)}<div class="product-body"><h3>${p.name||''}</h3>${desc?`<div class="meta">${desc}</div>`:''}<div class="price">${money(p.price)} / ${p.unit||''}</div><div class="qty-row"><div class="stepper"><button onclick="changeQty('${p.id}',-1)" type="button">-</button><input id="q_${p.id}" type="number" min="1" step="1" value="1"><button onclick="changeQty('${p.id}',1)" type="button">+</button></div><button class="btn-add" onclick="addToCart('${p.id}')" type="button">+ הוסף</button></div></div></div>`}).join('')}
function changeQty(id,delta){const el=document.getElementById('q_'+id); if(!el) return; el.value=Math.max(1,(Number(el.value)||1)+delta);}
function addToCart(id){const p=products.find(x=>String(x.id)===String(id)); if(!p)return; const qty=Math.max(1,Number(document.getElementById('q_'+id).value)||1); if(!cart[id])cart[id]={...p,qty:0}; cart[id].qty+=qty; renderCart(); showToast('נוסף לסל: '+p.name)}
function removeItem(id){delete cart[id];renderCart()}
function renderCart(){const items=Object.values(cart); const box=document.getElementById('cartItems'); if(!items.length){box.className='meta';box.innerHTML='עדיין לא נבחרו מוצרים'}else{box.className='';box.innerHTML=items.map(i=>`<div style="border-bottom:1px solid #2a2a2a;padding:6px 0"><b>${i.name}</b><br>${i.qty} ${i.unit||''} × ${money(i.price)} = ${money(i.qty*i.price)}<br><button class="chip" onclick="removeItem('${i.id}')">הסר</button></div>`).join('')} const total=items.reduce((s,i)=>s+i.qty*i.price,0); document.getElementById('cartTotal').textContent=money(total); document.getElementById('cartTotalMini').textContent=money(total); document.getElementById('cartCount').textContent=items.length;}
document.getElementById('orderForm').addEventListener('submit',async e=>{e.preventDefault(); const items=Object.values(cart); if(!items.length){showToast('צריך לבחור לפחות מוצר אחד');return} if(!GOOGLE_SCRIPT_URL.includes('script.google.com')){showToast('צריך להכניס קודם את קישור Apps Script בקובץ');return} const fd=new FormData(e.target); const payload={customer:{name:fd.get('name'),phone:fd.get('phone'),email:fd.get('email'),city:fd.get('city'),address:fd.get('address'),orderType:fd.get('orderType'),notes:fd.get('notes')},items:items.map(i=>({id:i.id,name:i.name,quantity:i.qty,unit:i.unit,price:Number(i.price),lineTotal:Number(i.qty*i.price)})),total:items.reduce((s,i)=>s+i.qty*i.price,0)}; try{const res=await fetch(GOOGLE_SCRIPT_URL,{method:'POST',body:JSON.stringify(payload),headers:{'Content-Type':'text/plain;charset=utf-8'}}); const data=await res.json(); if(data.success){showToast('ההזמנה נשלחה בהצלחה! מספר הזמנה: '+data.orderNumber); cart={};renderCart();e.target.reset();}else throw new Error(data.error||'שגיאה')}catch(err){showToast('שגיאה בשליחת ההזמנה: '+err.message)}});
loadProducts();
</script>
</body>
</html>
